name: Test

on:
  push:
    branches: [main]
  pull_request:

# ยกเลิก run เก่าของ branch/PR เดียวกันเมื่อ push ใหม่ (ประหยัด CI minutes)
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit / Integration / Property tests + coverage gate ──────────────────
  unit:
    name: Unit + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests + coverage (threshold gate)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── End-to-end (Playwright) on production build ──────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright chromium + deps
        run: npx playwright install --with-deps chromium

      - name: Run E2E (webServer builds + previews automatically)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
